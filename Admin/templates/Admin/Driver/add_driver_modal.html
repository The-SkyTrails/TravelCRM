{% load static %}
<div class="modal animation-modal fade" id="exampleModalLong-1" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <form action="" id="add-country-form" enctype="multipart/form-data">
            {% csrf_token %}
       <div class="modal-content">
            <div class="modal-header">
             <h5 class="modal-title" id="exampleModalLongTitle-1">Add Driver</h5>
             <button type="button" class="close" data-dismiss="modal" aria-label="Close">
             <span aria-hidden="true">&times;</span>
             </button>
            </div>
            <div class="modal-body">
             {% comment %} <img src="{% static "assets/images/small/img-3.jpg" %}" alt="" class="img-fluid"> {% endcomment %}
            
                <div class="row mb-3">
                    <div class="col-lg-6">
                        <label for="country-name">Name</label>
                        <input type="text" class="form-control" placeholder="Enter Name"  hx-target="#post-data-container2" hx-trigger="keyup changed delay:500ms" name="name">
                                                     
                    </div> 
                    <!-- <div id="post-data-container2"></div> -->
                    <div class="col-lg-2">
                        <label for="country-name">Code</label>
                        <input type="text" class="form-control" placeholder="+91"  hx-target="#post-data-container2" hx-trigger="keyup changed delay:500ms" name="code">
                                                     
                    </div>
                    <div class="col-lg-4">
                        <label for="country-name">Mobile</label>
                        <input type="text" class="form-control" placeholder="Enter Number"  hx-target="#post-data-container2" hx-trigger="keyup changed delay:500ms" name="mobile">
                                                     
                    </div>
                </div> 
                <div class="row mb-3">
                    <div class="col-lg-6">
                        <label for="country-name">Alternate Number</label>
                        <input type="text" class="form-control" placeholder="Enter No" name="alternate_no">
                                                     
                    </div> 
                    <div class="col-lg-6">
                        <label for="country-name">ID No./Passport No.</label>
                        <input type="text" class="form-control" placeholder="Enter Passport" name="passport">
                                                     
                    </div> 
                </div> 
                <div class="row mb-3">
                    <div class="col-lg-6">
                        <label for="country-name">Vehicle</label>
                        <select class="select2" name="vehicle" id="vehicle" style="width:100%;height:100%;">
                            {% for vehicle in vechicle %}
                            <option value="{{ vehicle.id }}">{{ vehicle.name }}</option>
                            {% endfor %}
                        </select>
                        
                                                     
                    </div> 
                    <div class="col-lg-6">
                        <label for="country-name">Vehicle Capacity</label>
                        <input class="form-control" placeholder="Enter Capacity" id="transferCapacity" readonly>
                    </div>

                    
                </div> 
                <div class="row mb-3">
                <div class="col-lg-12">
                    <label for="country-name">Car Image</label>
                    <input type="file" class="form-control" name="car_image">
                                                 
                </div> 
                </div>
                <div class="row mb-3">
                    <div class="col-lg-12">
                        <label for="country-name">License Image</label>
                        <input type="file" class="form-control" name="licence_image">
                                                    
                    </div> 
                </div>  
                <div class="row mb-3">
                    <div class="col-lg-12">
                        <label for="country-name">Address</label>
                        <input type="text" class="form-control"  name="address" placeholder="Enter Address">
                                                    
                    </div> 
                </div>
                
            </div>
            <div class="modal-footer">
             <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
             <button type="button" class="btn btn-primary" id="save-country-btn">Save </button>
            </div>
       </div>
    </form>
    </div>
 </div>

 
 <script>
    document.getElementById('save-country-btn').addEventListener('click', function() {
        
        var form = document.getElementById('add-country-form');
        var formData = new FormData(form);
        var xhr = new XMLHttpRequest();
        xhr.open('POST', "{% url 'driver' %}", true);
        xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
        xhr.setRequestHeader('X-CSRFToken', '{{ csrf_token }}');
        xhr.onload = function () {
            if (xhr.status === 200) {
                
                window.location.href = "{% url 'add_driver' %}";
                // Reload the page
                {% comment %} window.location.reload();  {% endcomment %}
                
            } else if (xhr.status === 400) {
                // Handle bad request response
                
                                            
               //document.getElementById('custom-html-alert').style.display = 'block';
               showCountryExistsAlert("Driver");
            } else {
                // Handle other error responses
                alert('Error occurred');
            }
        };
        xhr.send(formData);
    });

</script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>



<script>
    $(document).ready(function() {
        // Function to fetch transfer capacity and update the input field
        function updateTransferCapacity() {
            var vehicleId = $("#vehicle").val();
            $.ajax({
                url: '/get_transfer_capacity/' + vehicleId,
                type: 'GET',
                success: function(data) {
                    $("#transferCapacity").val(data.transfer_capacity);
                },
                error: function(xhr, status, error) {
                    console.error(xhr.responseText);
                }
            });
        }

        // Call the function initially to populate transfer capacity
        updateTransferCapacity();

        // Add change event listener to select element
        $("#vehicle").change(function() {
            updateTransferCapacity();
        });
    });
</script>
