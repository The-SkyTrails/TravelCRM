<div  class="modal animation-modal fade" id="currency{{i.id}}" tabindex="-1" role="dialog"
   aria-hidden="true">
   <div class="modal-dialog" role="document">
      <form method="post" action="{% url 'edit_currency' i.id %}" hx-post="true" hx-swap="outerHTML" hx-target="#main" hx-trigger="htmx:afterSwap">
         {% csrf_token %}
      <div class="modal-content">

         <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLongTitle-1">Edit Currency</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
            </button>
         </div>
         <div class="modal-body">
            <div class="row mb-3">
                <div class="col-lg-12">
                    <label for="country-name">Name</label>
                    <input type="text" class="form-control" placeholder="Enter Name" value="{{i.name}}" name="name">
                                                 
                </div> 
               
            </div> 
            <div class="row mb-3">
                <div class="col-lg-12">
                    <label for="country-name">Value</label>
                    <input type="text" class="form-control" placeholder="Enter Value" value="{{i.value}}" name="value">
                                                 
                </div> 
               
            </div> 
            <div class="row mb-3">
                <div class="col-lg-12">
                    <label for="country-name">Base Currency</label>
                    
                                                 
                </div> 
                <div class="col-lg-12">
                    
                    <select name="base_currency" id="base_currency" class="select2" style="width:100%;height:100%;">
                     <option value="Yes" {% if i.base_currency == "Yes" %}selected{% endif %}>Yes</option>
                     <option value="No" {% if i.base_currency == "No" %}selected{% endif %}>No</option>
                    </select>
                                                 
                </div> 
               
            </div> 
           
         </div>
         <div class="modal-footer">
            <button type="button" class="btn btn-secondary"
               data-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
            
         </div>
         
      </div>
      </form>
   </div>
</div>

<div class="ddemo"></div>





<script>

   document.addEventListener('htmx:afterSwap', function(event) {
      $('#currency{{i.id}}').modal('hide');
  });
  
</script>
