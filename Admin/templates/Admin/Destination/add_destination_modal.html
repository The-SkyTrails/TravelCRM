{% load static %}
<div class="modal animation-modal fade" id="exampleModalLong-1" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <form action="" id="add-destination-form">
            {% csrf_token %}
       <div class="modal-content">
            <div class="modal-header">
             <h5 class="modal-title" id="exampleModalLongTitle-1">Add Destination</h5>
             <button type="button" class="close" data-dismiss="modal" aria-label="Close">
             <span aria-hidden="true">&times;</span>
             </button>
            </div>
            <div class="modal-body">
             {% comment %} <img src="{% static "assets/images/small/img-3.jpg" %}" alt="" class="img-fluid"> {% endcomment %}
            
                <div class="row mb-3">
                    <div class="col-lg-12">
                        <label for="country-name">Name</label>
                        <input type="text" class="form-control" placeholder="Enter Name" hx-post="{% url "checkdestinationname" %}"  hx-target="#post-data-container" hx-trigger="keyup changed delay:500ms" name="name">
                                                     
                    </div> 
                    <div id="post-data-container"></div>
                </div> 
                <div class="row mb-3">
                    <div class="col-lg-12">
                        <label for="country-name">Country</label>
                        <select class="select2" name="country_id" style="width:100%">
                            {% for country in country %}
                            <option value="{{country.id}}">{{country.country_name}}</option>
                             {% endfor %}

                        </select>
                                                     
                    </div> 
                </div> 
              
                
            </div>
            <div class="modal-footer">
             <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
             
             <button type="button" class="btn btn-primary" id="save-destination-btn">Save </button>
            </div>
       </div>
    </form>
    </div>
 </div>

 
 <script>
    document.getElementById('save-destination-btn').addEventListener('click', function() {
        
        var form = document.getElementById('add-destination-form');
        var formData = new FormData(form);
        var xhr = new XMLHttpRequest();
        xhr.open('POST', "{% url 'destination' %}", true);
        xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
        xhr.setRequestHeader('X-CSRFToken', '{{ csrf_token }}');
        xhr.onload = function () {
            if (xhr.status === 200) {
                console.log("workkk")
                
                window.location.href = "{% url 'add_destination' %}";
                // Reload the page
                {% comment %} window.location.reload();  {% endcomment %}
                
            } else if (xhr.status === 400) {
                // Handle bad request response
                
                                                    
                {% comment %} alert('Country name already exists'); {% endcomment %}
               //document.getElementById('custom-html-alert').style.display = 'block';
               showCountryExistsAlert("Destination");
            } else {
                // Handle other error responses
                alert('Error occurred');
            }
        };
        xhr.send(formData);
    });

</script>
