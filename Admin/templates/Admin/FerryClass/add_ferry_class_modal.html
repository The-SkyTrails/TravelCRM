{% load static %}
<div class="modal animation-modal fade" id="exampleModalLong-1" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <form action="" id="add-ferry-class-form">
            {% csrf_token %}
       <div class="modal-content">
            <div class="modal-header">
             <h5 class="modal-title" id="exampleModalLongTitle-1">Add Ferry Class</h5>
             <button type="button" class="close" data-dismiss="modal" aria-label="Close">
             <span aria-hidden="true">&times;</span>
             </button>
            </div>
            <div class="modal-body">
             {% comment %} <img src="{% static "assets/images/small/img-3.jpg" %}" alt="" class="img-fluid"> {% endcomment %}
            
                <div class="row mb-3">
                    <div class="col-lg-12">
                        <label for="country-name">Name</label>
                        <input type="text" class="form-control" placeholder="Enter Name" hx-post="{% url "checkferryclassname" %}"  hx-target="#post-data-container2" hx-trigger="keyup changed delay:500ms" name="name">
                                                     
                    </div> 
                    <div id="post-data-container2"></div>
                </div> 
                
                
            </div>
            <div class="modal-footer">
             <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
             <button type="button" class="btn btn-primary" id="save-ferry-class-btn">Save </button>
            </div>
       </div>
    </form>
    </div>
 </div>

 
 <script>
    document.getElementById('save-ferry-class-btn').addEventListener('click', function() {
        
        var form = document.getElementById('add-ferry-class-form');
        var formData = new FormData(form);
        var xhr = new XMLHttpRequest();
        xhr.open('POST', "{% url 'ferry_class' %}", true);
        xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
        xhr.setRequestHeader('X-CSRFToken', '{{ csrf_token }}');
        xhr.onload = function () {
            if (xhr.status === 200) {
                console.log("workkk")
                
                window.location.href = "{% url 'add_ferry_class' %}";
                // Reload the page
                {% comment %} window.location.reload();  {% endcomment %}
                
            } else if (xhr.status === 400) {
                // Handle bad request response
                
                                                    
               //document.getElementById('custom-html-alert').style.display = 'block';
               showCountryExistsAlert("Ferry Class");
            } else {
                // Handle other error responses
                alert('Error occurred');
            }
        };
        xhr.send(formData);
    });

</script>
