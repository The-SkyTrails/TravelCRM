<div  class="modal animation-modal fade" id="flight{{i.id}}" tabindex="-1" role="dialog"
   aria-hidden="true">
   <div class="modal-dialog" role="document">
      <form method="post" action="{% url 'edit_flight' i.id %}" hx-post="true" hx-swap="outerHTML" hx-target="#main" hx-trigger="htmx:afterSwap" enctype="multipart/form-data">
         {% csrf_token %}
      <div class="modal-content">

         <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLongTitle-1">Edit Flight</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
            </button>
         </div>
         <div class="modal-body">
            <div class="row mb-3">
               <div class="col-lg-12">
                   <label for="country-name">Name</label>
                   <input type="text" class="form-control" placeholder="Enter Name" hx-post="{% url "checkflightname" %}"  hx-target="#post-data-container2" hx-trigger="keyup changed delay:500ms" name="name" value="{{i.name}}">
                                                
               </div> 
               <div id="post-data-container2"></div>
           </div> 
           
           <div class="row mb-3">
               <div class="col-lg-12">
                  <label for="country-name">Image</label>
                  <input type="file" class="form-control" value="{{i.image}}" name="image">
                                                
               </div> 
               
           </div> 
           
         </div>
         <div class="modal-footer">
            <button type="button" class="btn btn-secondary"
               data-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
            
         </div>
         
      </div>
      </form>
   </div>
</div>

<div class="ddemo"></div>





<script>

   document.addEventListener('htmx:afterSwap', function(event) {
      $('#flight{{i.id}}').modal('hide');
  });
  
</script>
