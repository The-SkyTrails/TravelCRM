<div  class="modal animation-modal fade" id="specialdays-{{i.id}}" tabindex="-1" role="dialog"
   aria-hidden="true">
   <div class="modal-dialog" role="document">
      <form method="post" action="{% url "edit_specialdays" i.id %}" hx-post="true" hx-swap="outerHTML" hx-target="#main" hx-trigger="htmx:afterSwap">
      
         {% csrf_token %}
      <div class="modal-content">

         <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLongTitle-1">Edit Special Days</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
            </button>
         </div>
         <div class="modal-body">
            <div class="row mb-3">
                <div class="col-lg-12">
                    <label for="country-name">Name</label>
                    <input type="text" class="form-control" placeholder="Enter Name" value="{{i.name}}" name="name">
                                                 
                </div> 
               
            </div> 
            <div class="row mb-3">
               <div class="col-lg-6">
                  <label for="country-name">Block Out From Date</label>
                  <input type="date" class="form-control" name="block_out_from_date" value="{{i.block_out_from_date|date:'Y-m-d'}}">
                                               
              </div> 
              <div class="col-lg-6">
                  <label for="country-name">Block Out To Date</label>
                  <input type="date" class="form-control" name="block_out_to_date" value="{{i.block_out_to_date|date:'Y-m-d'}}">
                                               
              </div> 
               
            </div> 

           
         </div>
         <div class="modal-footer">
            <button type="button" class="btn btn-secondary"
               data-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
            
         </div>
         
      </div>
      </form>
   </div>
</div>
