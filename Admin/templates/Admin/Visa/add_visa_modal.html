{% load static %}
<div class="modal animation-modal fade" id="exampleModalLong-1" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <form action="" id="add-visa-form">
            {% csrf_token %}
       <div class="modal-content">
            <div class="modal-header">
             <h5 class="modal-title" id="exampleModalLongTitle-1">Add Visa</h5>
             <button type="button" class="close" data-dismiss="modal" aria-label="Close">
             <span aria-hidden="true">&times;</span>
             </button>
            </div>
            <div class="modal-body">
             {% comment %} <img src="{% static "assets/images/small/img-3.jpg" %}" alt="" class="img-fluid"> {% endcomment %}
            
            <div class="row mb-3">
                <div class="col-lg-12">
                    <label for="country-name">Name</label>
                    <input type="text" class="form-control" placeholder="Enter Name" hx-post="{% url "checkvisaname" %}"  hx-target="#post-data-container2" hx-trigger="keyup changed delay:500ms" name="name">
                                                 
                </div> 
                <div id="post-data-container2"></div>
            </div> 
            <div class="row mb-3">
                <div class="col-lg-12">
                    <label for="currency-name">Currency</label>
                    <select name="currency_id" class="select2  mb-3" style="width:100%;height:100%;">
                        <option  selected disabled>Select</option>
                        {% for currency in currency %}
                        <option value="{{currency.id}}">{{currency.name}}</option>
                        
                        {% endfor %}
                    </select>
                                                 
                </div> 
                
            </div> 
            
            
            <div class="row mb-3">
                <div class="col-lg-4">
                    <label for="country-name">Adult Cost</label>
                    <input type="text" class="form-control" placeholder="Adult Cost" name="adult">
                                                 
                </div> 
                <div class="col-lg-4">
                    <label for="country-name">Child Cost</label>
                    <input type="text" class="form-control" placeholder="Child Cost" name="child">
                                                 
                </div> 
                <div class="col-lg-4">
                    <label for="country-name">Infant Cost</label>
                    <input type="text" class="form-control" placeholder="Infant Cost" name="infant">
                                                 
                </div> 
                
            </div> 
                
            </div>
            <div class="modal-footer">
             <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
             <button type="button" class="btn btn-primary" id="save-visa-btn">Save </button>
            </div>
       </div>
    </form>
    </div>
 </div>

 
 <script>
    document.getElementById('save-visa-btn').addEventListener('click', function() {
        
        var form = document.getElementById('add-visa-form');
        var formData = new FormData(form);
        var xhr = new XMLHttpRequest();
        xhr.open('POST', "{% url 'visa' %}", true);
        xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
        xhr.setRequestHeader('X-CSRFToken', '{{ csrf_token }}');
        xhr.onload = function () {
            if (xhr.status === 200) {
                console.log("workkk")
                
                window.location.href = "{% url 'add_visa' %}";
                // Reload the page
                {% comment %} window.location.reload();  {% endcomment %}
                
            } else if (xhr.status === 400) {
                // Handle bad request response
                
                                                    
               //document.getElementById('custom-html-alert').style.display = 'block';
               showCountryExistsAlert("Visa");
            } else {
                // Handle other error responses
                alert('Error occurred');
            }
        };
        xhr.send(formData);
    });

</script>
