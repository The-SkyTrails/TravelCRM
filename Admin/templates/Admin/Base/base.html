        <script>
        $(document).ready(function() {
    $('.select').each(function() {
        // Check if the select element has a parent modal
        var modalParent = $(this).closest('.modal');
        
        if (modalParent.length > 0) {
            // If a modal parent is found, initialize Select2 with modal as the dropdown parent
            $(this).select2({
                placeholder: 'Select an option',
                dropdownParent: modalParent
            });
        } else {
            // If no modal parent is found, initialize Select2 normally
            $(this).select2({
                placeholder: 'Select an option'
            });
        }
    });
});

        </script>
